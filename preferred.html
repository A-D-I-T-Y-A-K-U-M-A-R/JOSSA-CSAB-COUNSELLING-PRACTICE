<!DOCTYPE html>
<html>
<head>
<title>Preferred Choices</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<div class="header">JOSAA/CSAB PRACTICE COUNSELLING CHOICES</div>

<!-- NOTE + FAQ -->
<div style="text-align:center; margin-top:10px; position:relative;">
<span>
IMPORTANT NOTE: This counselling result is specifically accurate for candidates who are: Open Category | Home State: Jharkhand | Gender Neutral
</span>

<button style="
position:absolute;
right:120px;
background:lime;
border:2px solid black;
padding:5px 12px;
font-weight:bold;
">
FAQ
</button>

</div>

<!-- INPUT AREA -->
<div style="text-align:center; margin-top:30px;">

<input type="number" id="rank" value="222" style="
background:gold;
border:none;
padding:10px;
width:200px;
text-align:center;
font-weight:bold;
">

<br><br>

<select id="exam" style="
background:cyan;
padding:8px 20px;
font-weight:bold;
">
<option value="MAINS">JEE MAINS</option>
<option value="ADVANCE">JEE ADVANCE</option>
</select>

<br><br>

<button id="previewBtn" style="
background:pink;
padding:8px 20px;
font-weight:bold;
">
SEE_PREVIEW
</button>

</div>

<!-- BUTTONS ROW -->
<div style="
display:flex;
justify-content:space-between;
margin:40px 100px;
">

<select id="lockStatus" style="
background:darkred;
color:white;
padding:10px 20px;
font-weight:bold;
">
<option value="lock">LOCK</option>
<option value="unlock">UNLOCK</option>
</select>

<button style="
background:darkred;
color:white;
padding:10px 25px;
font-weight:bold;
">
GO_TO_CHOICE_FILLING
</button>

<button onclick="resetAll()" style="
background:crimson;
color:white;
padding:10px 25px;
font-weight:bold;
">
UNFILTER_ALL
</button>

</div>

<!-- 🔥 SEARCH BAR EXACT POSITION -->
<div style="text-align:center;">

<div class="search-row">

<select id="typeSearch2" style="background:#ddd;">
<option value="">INSTITUTE TYPE</option>
<option value="IIT">IIT</option>
<option value="NIT">NIT</option>
<option value="IIIT">IIIT</option>
<option value="GFTI">GFTI</option>
</select>

<input id="instSearch2" placeholder="INSTITUTE NAME">
<input id="branchSearch2" placeholder="BRANCH">

<button id="searchBtn2" style="
background:cyan;
font-weight:bold;
padding:6px 15px;
">
SEARCH
</button>

<button id="clearSearch2" style="
background:red;
color:white;
font-weight:bold;
padding:6px 15px;
">
CLEAR_SEARCH
</button>

</div>

</div>

<!-- PREVIEW -->
<div style="
text-align:center;
font-weight:bold;
margin-top:20px;
font-size:20px;
">
PREVIEW
</div>

<table id="previewTable"></table>

<script src="preferred.js"></script>

</body>
</html>
