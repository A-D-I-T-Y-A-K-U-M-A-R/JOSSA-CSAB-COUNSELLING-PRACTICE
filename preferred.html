<!DOCTYPE html>
<html>
<head>
<title>Preferred Choices</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<div class="header">PREFERRED CHOICE BUILDER</div>

<div class="top-buttons">

<select id="exam">
<option value="MAINS">MAINS</option>
<option value="ADVANCE">ADVANCE</option>
</select>

<input type="number" id="rank" placeholder="ENTER RANK">

<button id="previewBtn">PREVIEW</button>

<button onclick="resetAll()">UNFILTER_ALL</button>

</div>

<!-- ✅ SEARCH BAR (SAFE POSITION) -->
<div class="search-row" style="margin-top:25px;">

<select id="typeSearch2">
<option value="">INSTITUTE TYPE</option>
<option value="IIT">IIT</option>
<option value="NIT">NIT</option>
<option value="IIIT">IIIT</option>
<option value="GFTI">GFTI</option>
</select>

<input id="instSearch2" placeholder="INSTITUTE NAME">
<input id="branchSearch2" placeholder="BRANCH">

<button id="searchBtn2">SEARCH</button>
<button id="clearSearch2">CLEAR_SEARCH</button>

</div>

<!-- ✅ KEEP ORIGINAL STRUCTURE -->
<div style="text-align:center; margin-top:20px; font-weight:bold; text-decoration:underline;">
PREVIEW TABLE
</div>

<table id="previewTable"></table>

<script src="preferred.js"></script>

</body>
</html>
