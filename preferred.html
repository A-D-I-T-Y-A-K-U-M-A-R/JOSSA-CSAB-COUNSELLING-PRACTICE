<!DOCTYPE html>
<html lang="en">
<head>

<title>Preferred Choices</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
#previewTable th{height:70px;}
#previewTable td{height:50px;}
#previewTable, #previewTable th, #previewTable td{
border:2px solid black;
}

/* 🔥 SEARCH BAR ABSOLUTE PERFECT LAYOUT */

.custom-search-row{
position:relative;
width:100%;
height:70px;
margin-top:70px;
margin-bottom:70px;
}

.custom-search-row select,
.custom-search-row input,
.custom-search-row button{
position:absolute;
top:50%;
transform:translate(-50%, -50%);
padding:8px 10px;
font-weight:bold;
}

/* LEFT */
#clearFilters{
left:0%;
transform:translate(0,-50%);
}

/* RIGHT */
#searchBtn{
left:100%;
transform:translate(-100%,-50%);
}

/* CENTER */
#instSearch{
left:50%;
width:18%;
}

/* LEFT-MID */
#typeSearch{
left:25%;
width:14%;
}

/* RIGHT-MID */
#branchSearch{
left:75%;
width:14%;
}



#rank{
background:gold;
text-align:center;
font-weight:bold;
}
#rank::placeholder{
color:black;
opacity:1;
}
</style>

</head>

<body id="top">

<!-- UNDO -->
<button onclick="undoRemove()" id="undoBtn">⬅</button>

<h1 class="header">JOSAA/CSAB PRACTICE COUNSELLING CHOICES</h1>

<p style="text-align:center;">
IMPORTANT NOTE: This counselling result is specifically accurate for candidates who are: Open Category | Home State: Jharkhand | Gender Neutral

<button onclick="document.getElementById('footer').scrollIntoView()"
style="background:lime;padding:5px 10px;margin-left:10px;">
FAQ
</button>
</p>

<div style="text-align:center;margin-top:40px">

<input id="rank" type="number" placeholder="ENTER_RANK" style="padding:10px;border:none">

<br><br>

<select id="exam" style="padding:10px;background:cyan;border:none;font-weight:bold;">
<option value="">EXAM_TYPE</option>
<option value="MAINS">JEE MAINS</option>
<option value="ADVANCE">JEE ADVANCE</option>
</select>

<br><br>

<button id="previewBtn"
style="padding:10px 20px;background:#ff69b4;color:black;font-weight:bold;border:none">
SEE_PREVIEW
</button>

</div>

<div style="display:flex;align-items:center;width:90%;margin:auto;margin-top:20px;position:relative;">

<select id="lockStatus"
style="position:absolute;left:0;padding:10px;border:2px solid black;font-weight:bold;background:#8B0000;color:white;">
<option value="unlock">UNLOCKED</option>
<option value="lock">LOCKED</option>
</select>

<a href="index.html" style="margin:auto;">
<button style="padding:10px 20px;background:#800000;color:white;font-weight:bold;">
GO_TO_CHOICE_FILLING
</button>
</a>

<button onclick="resetAll()"
style="position:absolute;right:0;background:#cc0033;color:white;padding:10px 20px;font-weight:bold;">
UNFILTER_ALL
</button>

</div>

<!-- 🔥 NEW SEARCH UI EXACT POSITION -->
<div class="custom-search-row">

<button id="clearFilters">CLEAR_ALL_SEARCHES</button>

<select id="typeSearch">
<option value="">Institute Type</option>
<option value="IIT">IIT</option>
<option value="NIT">NIT</option>
<option value="IIIT">IIIT</option>
<option value="GFTI">GFTI</option>
</select>

<input list="instList" id="instSearch" placeholder="Institute Name">
<datalist id="instList"></datalist>

<input list="branchList" id="branchSearch" placeholder="Branch">
<datalist id="branchList"></datalist>

<button id="searchBtn">SEARCH</button>

</div>

<h2 style="text-align:center;margin-top:0px">PREVIEW</h2>

<div style="width:95%;margin:auto;overflow:auto">
<table id="previewTable"></table>
</div>

<div id="footer" class="footer">
<div class="line"></div>
<div class="footerText">MADE__BY__ADITYA_KUMAR_SINGH</div>
<div class="line"></div>

<div style="text-align:center;margin-top:15px;">
<a href="#top">
<button style="background:lime;color:white;padding:6px 14px;">
GO_TO_TOP
</button>
</a>
</div>

<h2 style="text-align:center;margin-top:40px;text-decoration:underline;">FAQs</h2>

<div style="max-width:900px;margin:auto;font-size:16px;line-height:1.7">
<p><b>WHAT DOES THIS PAGE DO?</b><br>It generates counselling results.</p>
</div>

</div>

<script src="preferred.js"></script>

</body>
</html>
