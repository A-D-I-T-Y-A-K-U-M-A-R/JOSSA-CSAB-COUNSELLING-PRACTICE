<!DOCTYPE html>
<html>
<head>
<title>Preferred Choices</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<div class="header">JOSAA/CSAB PRACTICE COUNSELLING CHOICES</div>

<div style="text-align:center; margin-top:10px; position:relative;">

<span>
IMPORTANT NOTE: This counselling result is specifically accurate for candidates who are: Open Category | Home State: Jharkhand | Gender Neutral
</span>

<button style="position:absolute; right:120px; background:lime; padding:5px 10px;">
FAQ
</button>

</div>

<div style="text-align:center; margin-top:30px;">

<input type="number" id="rank" placeholder="ENTER RANK" style="background:gold; padding:10px; width:200px;">

<br><br>

<select id="exam" style="background:cyan; padding:8px 20px;">
<option value="MAINS">JEE MAINS</option>
<option value="ADVANCE">JEE ADVANCE</option>
</select>

<br><br>

<button id="previewBtn" style="background:pink; padding:8px 20px;">SEE_PREVIEW</button>

</div>

<div style="display:flex; justify-content:space-between; margin:40px 100px;">

<select id="lockStatus" style="background:darkred; color:white; padding:10px;">
<option value="lock">LOCK</option>
<option value="unlock">UNLOCK</option>
</select>

<button id="goBtn" style="background:darkred; color:white; padding:10px 20px;">
GO_TO_CHOICE_FILLING
</button>

<button id="resetBtn" style="background:red; color:white; padding:10px 20px;">
UNFILTER_ALL
</button>

</div>

<!-- SEARCH -->
<div style="text-align:center; margin-top:10px;">

<div class="search-row">

<select id="typeSearch2">
<option value="">INSTITUTE TYPE</option>
<option value="IIT">IIT</option>
<option value="NIT">NIT</option>
<option value="IIIT">IIIT</option>
<option value="GFTI">GFTI</option>
</select>

<input id="instSearch2" placeholder="INSTITUTE NAME">
<input id="branchSearch2" placeholder="BRANCH">

<button id="searchBtn2" style="background:cyan;">SEARCH</button>
<button id="clearSearch2" style="background:red; color:white;">CLEAR_SEARCH</button>

</div>

</div>

<div style="text-align:center; margin-top:25px; font-weight:bold;">
PREVIEW
</div>

<div style="margin-top:15px;">
<table id="previewTable"></table>
</div>

<script src="preferred.js"></script>

</body>
</html>
