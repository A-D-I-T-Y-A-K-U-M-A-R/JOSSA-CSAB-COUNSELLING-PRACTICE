<!DOCTYPE html>
<html>
<head>
<title>JoSAA Choice Filling Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="header">JoSAA Choice Filling Simulator</h1>

<div class="search-row">

<select id="typeSearch">
<option value="">Institute Type</option>
<option value="IIT">IIT</option>
<option value="NIT">NIT</option>
<option value="IIIT">IIIT</option>
<option value="GFTI">GFTI</option>
</select>

<input list="instList" id="instSearch" placeholder="Institute Name">
<datalist id="instList"></datalist>

<input list="branchList" id="branchSearch" placeholder="Branch">
<datalist id="branchList"></datalist>

<button id="searchBtn">Search</button>

</div>

<div class="top-buttons">
<button id="clearFilters">Clear All Filters</button>
<button id="downloadBtn">Download PDF</button>
</div>

<div class="tables">

<div class="left">

<h2>Available Choices</h2>
<p id="availableCount"></p>

<table id="leftTable">

<thead>
<tr>
<th>Institute</th>
<th>Branch</th>
<th>Choice No</th>
<th>Add</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div class="right">

<h2>Filled Choices</h2>

<div class="prefInfo">
<span class="filledCount"></span>
<span class="savedCount"></span>
</div>

<table id="rightTable">

<thead>
<tr>
<th>Institute</th>
<th>Branch</th>
<th>Choice No</th>
<th>Delete</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
